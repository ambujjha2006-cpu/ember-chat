<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ember — your AI chat</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🔥</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,500&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <span class="brand-mark">●</span>
        <span class="brand-name">Ember</span>
      </div>
      <button class="new-chat-btn" id="newChatBtn">+ New chat</button>
      <nav class="session-list" id="sessionList" aria-label="Chat history"></nav>
      <div class="sidebar-footer">
        <span class="dot-pulse" aria-hidden="true"></span>
        <span>Powered by an open model via Groq</span>
      </div>
    </aside>

    <main class="chat-pane">
      <header class="chat-header">
        <h1 id="chatTitle">New chat</h1>
      </header>

      <div class="messages" id="messages">
        <div class="empty-state" id="emptyState">
          <p class="eyebrow">Ember</p>
          <h2>What are you working on?</h2>
          <p class="sub">Ask anything — Ember remembers this conversation, and every conversation before it.</p>
        </div>
      </div>

      <form class="composer" id="composer">
        <textarea
          id="messageInput"
          placeholder="Message Ember…"
          rows="1"
          autofocus
        ></textarea>
        <button type="submit" id="sendBtn" aria-label="Send message">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M4 12L20 4L13 20L11 13L4 12Z" fill="currentColor"/></svg>
        </button>
      </form>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
